<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AOQRWE — Advanced Online Quiz System</title>
  <meta name="description" content="AOQRWE — Advanced Online Quiz System with Real-time Evaluation. Students take timed quizzes, admins manage subjects and questions." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="static/css/style.css" />
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <!-- ========== TOP HEADER NAV ========== -->
  <header class="top-nav glass-panel" id="topNav">
    <div class="nav-brand">
      <span class="brand-logo neon-text">AOQRWE</span>
    </div>
    <div class="nav-center" id="navCenter">
      <!-- Start button shown only when not logged in -->
    </div>
    <div class="nav-actions" id="navActions">
      <!-- Populated by JS based on auth state -->
    </div>
  </header>

  <!-- ========== MAIN APP ROOT ========== -->
  <main class="app-container" id="appRoot">
    <!-- All pages rendered here by JS -->
  </main>

  <!-- ========== AUTH MODAL ========== -->
  <div class="modal-overlay" id="authModal" role="dialog" aria-modal="true" aria-label="Login / Register">
    <div class="modal-content glass-panel">
      <button class="close-modal" id="closeAuthModal" aria-label="Close">&times;</button>

      <!-- Role Tabs -->
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="student" id="tabStudent">
          <i class="fas fa-user-graduate"></i> Student
        </button>
        <button class="tab-btn" data-tab="admin" id="tabAdmin">
          <i class="fas fa-shield-alt"></i> Admin
        </button>
      </div>

      <!-- Student Section -->
      <div class="auth-section active" id="studentSection">
        <div class="auth-switch">
          <span class="auth-toggle active" data-form="studentLogin">Login</span>
          <span class="auth-toggle" data-form="studentRegister">Register</span>
        </div>

        <!-- Student Login -->
        <form id="studentLoginForm" class="auth-form active" novalidate>
          <div class="form-group">
            <i class="fas fa-envelope text-icon"></i>
            <input type="email" id="sLoginEmail" placeholder="Email Address" required autocomplete="email" />
          </div>
          <div class="form-group">
            <i class="fas fa-lock text-icon"></i>
            <input type="password" id="sLoginPass" placeholder="Password" required autocomplete="current-password" />
          </div>
          <div class="form-error" id="sLoginErr"></div>
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <!-- Student Register -->
        <form id="studentRegisterForm" class="auth-form" novalidate>
          <div class="form-group">
            <i class="fas fa-user text-icon"></i>
            <input type="text" id="sRegName" placeholder="Full Name" required autocomplete="name" />
          </div>
          <div class="form-group">
            <i class="fas fa-envelope text-icon"></i>
            <input type="email" id="sRegEmail" placeholder="Email Address" required autocomplete="email" />
          </div>
          <div class="form-group">
            <i class="fas fa-lock text-icon"></i>
            <input type="password" id="sRegPass" placeholder="Create Password" required autocomplete="new-password" />
          </div>
          <div class="form-error" id="sRegErr"></div>
          <button type="submit" class="btn btn-secondary btn-block">Create Account</button>
        </form>
      </div>

      <!-- Admin Section -->
      <div class="auth-section" id="adminSection">
        <div class="auth-switch">
          <span class="auth-toggle active" data-form="adminLogin">Login</span>
          <span class="auth-toggle" data-form="adminRegister">Register</span>
        </div>

        <!-- Admin Login -->
        <form id="adminLoginForm" class="auth-form active" novalidate>
          <div class="form-group">
            <i class="fas fa-user-shield text-icon"></i>
            <input type="email" id="aLoginEmail" placeholder="Admin Email" required autocomplete="email" />
          </div>
          <div class="form-group">
            <i class="fas fa-lock text-icon"></i>
            <input type="password" id="aLoginPass" placeholder="Admin Password" required autocomplete="current-password" />
          </div>
          <div class="form-error" id="aLoginErr"></div>
          <button type="submit" class="btn btn-admin btn-block">
            <i class="fas fa-shield-alt"></i> Admin Secure Login
          </button>
        </form>

        <!-- Admin Register -->
        <form id="adminRegisterForm" class="auth-form" novalidate>
          <div class="form-group">
            <i class="fas fa-user text-icon"></i>
            <input type="text" id="aRegName" placeholder="Full Name" required autocomplete="name" />
          </div>
          <div class="form-group">
            <i class="fas fa-envelope text-icon"></i>
            <input type="email" id="aRegEmail" placeholder="Admin Email" required autocomplete="email" />
          </div>
          <div class="form-group">
            <i class="fas fa-lock text-icon"></i>
            <input type="password" id="aRegPass" placeholder="Create Password" required autocomplete="new-password" />
          </div>
          <div class="form-error" id="aRegErr"></div>
          <button type="submit" class="btn btn-admin btn-block">Register Admin Account</button>
        </form>
      </div>
    </div>
  </div>

  <!-- ========== DASHBOARD SELECTION MODAL (after clicking Start 🚀) ========== -->
  <div class="modal-overlay" id="dashboardModal" role="dialog" aria-modal="true" aria-label="Select Dashboard">
    <div class="modal-content glass-panel text-center" style="max-width:460px;">
      <button class="close-modal" id="closeDashboardModal" aria-label="Close">&times;</button>
      <h2 class="mb-1" style="font-size:1.8rem;">Select Dashboard</h2>
      <p class="text-muted mb-3">Choose how you want to continue with AOQRWE</p>
      <div class="dashboard-select-grid">
        <button class="dash-select-card" id="goUserDashboard">
          <div class="dash-select-icon user-icon">
            <i class="fas fa-user-graduate fa-3x"></i>
          </div>
          <div class="dash-select-label">User Dashboard</div>
          <div class="dash-select-sub">Take exams &amp; view results</div>
        </button>
        <button class="dash-select-card" id="goAdminDashboard">
          <div class="dash-select-icon admin-icon">
            <i class="fas fa-shield-alt fa-3x"></i>
          </div>
          <div class="dash-select-label">Admin Dashboard</div>
          <div class="dash-select-sub">Manage subjects &amp; questions</div>
        </button>
      </div>
    </div>
  </div>

  <!-- ========== SUBMIT CONFIRM MODAL (checkbox-based) ========== -->
  <div class="modal-overlay" id="submitConfirmModal" role="dialog" aria-modal="true">
    <div class="modal-content glass-panel text-center" style="max-width:420px;">
      <div class="submit-confirm-icon">
        <i class="fas fa-paper-plane fa-3x text-teal"></i>
      </div>
      <h3 class="mb-2 mt-2">Submit Exam?</h3>
      <p class="text-muted mb-3">Please confirm before submitting. This action cannot be undone.</p>
      <label class="confirm-checkbox-label" id="submitCheckLabel">
        <input type="checkbox" id="submitConfirmCheck" />
        <span class="checkmark-box"></span>
        I want to submit my exam
      </label>
      <div class="flex-row mt-3" style="justify-content:center;gap:1rem;">
        <button class="btn btn-secondary" id="submitConfirmCancel">Cancel</button>
        <button class="btn btn-primary" id="submitConfirmOk" disabled>
          <i class="fas fa-check"></i> Submit Now
        </button>
      </div>
    </div>
  </div>

  <!-- ========== CONFIRM MODAL (generic) ========== -->
  <div class="modal-overlay" id="confirmModal" role="dialog" aria-modal="true">
    <div class="modal-content glass-panel text-center" style="max-width:380px;">
      <h3 class="mb-2" id="confirmTitle">Are you sure?</h3>
      <p class="text-muted mb-3" id="confirmMsg">This action cannot be undone.</p>
      <div style="display:flex;gap:1rem;justify-content:center;">
        <button class="btn btn-secondary" id="confirmCancel">Cancel</button>
        <button class="btn btn-primary" id="confirmOk">Yes, Proceed</button>
      </div>
    </div>
  </div>

  <!-- ========== TOAST NOTIFICATION ========== -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- html2canvas for PDF rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- Main app -->
  <script src="static/js/app.js"></script>
</body>
</html>
