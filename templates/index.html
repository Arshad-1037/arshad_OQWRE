{% extends 'base.html' %}

{% block title %}AOQRWE - Knowledge Assessor{% endblock %}

{% block content %}
<div class="landing-wrapper">
    <header class="hero-section">
        <div class="hero-content">
            <h1 class="brand-title">AOQRWE</h1>
            <p class="brand-subtitle">Advanced Online Quiz System with Real-time Evaluation</p>
            <button class="btn btn-primary btn-glow" id="openAuthModalBtn">
                <i class="fas fa-rocket"></i> Login / Register
            </button>
        </div>
        <div class="hero-graphics">
            <div class="glass-card decorative-card">
                <i class="fas fa-brain fa-3x neon-text"></i>
                <h3>30-Second Challenge</h3>
                <p>Test your knowledge under pressure.</p>
            </div>
        </div>
    </header>
</div>

<!-- Integrated Auth Modal (Hidden by Default) -->
<div class="modal-overlay" id="authModal">
    <div class="modal-content glass-panel">
        <button class="close-modal" id="closeAuthModalBtn">&times;</button>
        
        <!-- Auth Tabs -->
        <div class="auth-tabs">
            <button class="tab-btn active" data-target="student-auth">Student</button>
            <button class="tab-btn" data-target="admin-auth">Admin</button>
        </div>

        <!-- Student Auth Form -->
        <div class="auth-section active" id="student-auth">
            <div class="auth-switch">
                <span class="auth-toggle active" data-form="student-login">Login</span>
                <span class="auth-toggle" data-form="student-register">Register</span>
            </div>
            
            <form id="student-login-form" class="auth-form active" action="{{ url_for('login') }}" method="POST">
                <input type="hidden" name="role_type" value="student">
                <div class="form-group">
                    <i class="fas fa-user text-icon"></i>
                    <input type="text" name="username" placeholder="Student Username" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock text-icon"></i>
                    <input type="password" name="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-block btn-accent">Sign In</button>
            </form>

            <form id="student-register-form" class="auth-form" action="{{ url_for('register') }}" method="POST">
                <input type="hidden" name="role_type" value="student">
                <div class="form-group">
                    <i class="fas fa-user-plus text-icon"></i>
                    <input type="text" name="username" placeholder="Choose a Username" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-key text-icon"></i>
                    <input type="password" name="password" placeholder="Create a Password" required>
                </div>
                <button type="submit" class="btn btn-block btn-secondary">Register Account</button>
            </form>
        </div>

        <!-- Admin Auth Form -->
        <div class="auth-section" id="admin-auth">
            <h3 class="admin-title"><i class="fas fa-shield-alt"></i> Administrator Portal</h3>
            <form id="admin-login-form" class="auth-form active" action="{{ url_for('login') }}" method="POST">
                <input type="hidden" name="role_type" value="admin">
                <div class="form-group">
                    <i class="fas fa-user-shield text-icon"></i>
                    <input type="text" name="username" placeholder="Admin ID / Username" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock text-icon"></i>
                    <input type="password" name="password" placeholder="Admin Password" required>
                </div>
                <button type="submit" class="btn btn-block btn-admin">Admin Secure Login</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
